image:
  repository: cr.fluentbit.io/fluent/fluent-bit

env:
  - name: ES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: elasticsearch-es-elastic-user
        key: elastic

extraVolumes:
  - name: es-certs
    secret:
      secretName: elasticsearch-es-http-certs-public

extraVolumeMounts:
  - name: es-certs
    mountPath: /etc/es-certs
    readOnly: true

config:
  service: |
    [SERVICE]
        Daemon Off
        Log_Level info
        Parsers_File parsers.conf
        Parsers_File custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020

  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/obs-*_monitoring_obs-*.log
        multiline.parser cri
        Tag kube.obs.*
        Refresh_Interval 5
        Mem_Buf_Limit 10MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name kubernetes
        Match kube.obs.*
        Kube_Tag_Prefix kube.obs.var.log.containers.
        Merge_Log On
        Merge_Log_Key log_processed
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On

    [FILTER]
        Name grep
        Match kube.obs.*
        Regex $kubernetes['namespace_name'] ^monitoring$

    [FILTER]
        Name grep
        Match kube.obs.*
        Regex $kubernetes['container_name'] ^obs$

  outputs: |
    [OUTPUT]
        Name es
        Match kube.obs.*
        Host elasticsearch-es-http.logging.svc.cluster.local
        Port 9200
        HTTP_User elastic
        HTTP_Passwd ${ES_PASSWORD}
        tls On
        tls.verify On
        tls.ca_file /etc/es-certs/ca.crt
        Logstash_Format On
        Logstash_Prefix obs-logs
        Replace_Dots On
        Retry_Limit 5
        Suppress_Type_Name On

  customParsers: |
    [PARSER]
        Name docker_no_time
        Format json
        Time_Keep Off
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
